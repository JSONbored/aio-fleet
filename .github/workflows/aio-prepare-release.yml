name: Reusable AIO Prepare Release

on:
  workflow_call:
    inputs:
      release_name:
        required: true
        type: string
      component:
        required: false
        default: ""
        type: string
      component_label:
        required: false
        default: ""
        type: string
      previous_tag_command:
        required: false
        default: latest-aio-tag
        type: string
      git_cliff_version:
        required: false
        default: 2.12.0
        type: string

permissions:
  contents: read

jobs:
  prepare-release:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: ${{ inputs.git_cliff_version }}
        run: |
          set -euo pipefail
          archive="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL -o "/tmp/${archive}" "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/${archive}"
          tar -xzf "/tmp/${archive}" -C /tmp
          install "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
          git-cliff --version

      - name: Check for unreleased changes
        id: changes
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          set -euo pipefail
          component_args=()
          if [[ -n "${COMPONENT}" ]]; then
            component_args=(--component "${COMPONENT}")
          fi
          has_changes="$(python3 scripts/release.py "${component_args[@]}" has-unreleased-changes)"
          echo "has_changes=${has_changes}" >> "${GITHUB_OUTPUT}"

      - name: Compute release version
        id: version
        if: steps.changes.outputs.has_changes == 'true'
        env:
          COMPONENT: ${{ inputs.component }}
        run: |
          set -euo pipefail
          component_args=()
          if [[ -n "${COMPONENT}" ]]; then
            component_args=(--component "${COMPONENT}")
          fi
          release_version="$(python3 scripts/release.py "${component_args[@]}" next-version)"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Generate changelog
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          COMPONENT: ${{ inputs.component }}
          PREVIOUS_TAG_COMMAND: ${{ inputs.previous_tag_command }}
        run: |
          set -euo pipefail
          component_args=()
          if [[ -n "${COMPONENT}" ]]; then
            component_args=(--component "${COMPONENT}")
          fi
          previous_tag="$(python3 scripts/release.py "${component_args[@]}" "${PREVIOUS_TAG_COMMAND}")"
          if [[ -f CHANGELOG.md && -n "${previous_tag}" ]]; then
            git-cliff --config cliff.toml --tag "${RELEASE_VERSION}" "${previous_tag}..HEAD" --prepend CHANGELOG.md
          else
            git-cliff --config cliff.toml --tag "${RELEASE_VERSION}" --output CHANGELOG.md
          fi
          parsed_version="$(python3 scripts/release.py latest-changelog-version)"
          if [[ "${parsed_version}" != "${RELEASE_VERSION}" ]]; then
            echo "Generated changelog top section ${parsed_version} does not match ${RELEASE_VERSION}" >&2
            exit 1
          fi

      - name: Sync template Changes from changelog
        if: steps.changes.outputs.has_changes == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          COMPONENT: ${{ inputs.component }}
        run: |
          set -euo pipefail
          if [[ -n "${COMPONENT}" ]]; then
            python3 scripts/update-template-changes.py --component "${COMPONENT}" "${RELEASE_VERSION}"
          else
            python3 scripts/update-template-changes.py "${RELEASE_VERSION}"
          fi

      - name: Prepare release PR body
        id: pr_body
        if: steps.changes.outputs.has_changes == 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          RELEASE_NAME: ${{ inputs.release_name }}
          COMPONENT_LABEL: ${{ inputs.component_label }}
        run: |
          set -euo pipefail
          subject="${COMPONENT_LABEL:-${RELEASE_NAME}}"
          {
            echo "body<<RELEASE_PR_BODY"
            echo "This PR prepares \`${RELEASE_VERSION}\` for \`${subject}\`."
            echo
            echo "- updates \`CHANGELOG.md\` with \`git-cliff\`"
            echo "- syncs the selected XML \`<Changes>\` from \`CHANGELOG.md\`"
            echo "- is intended to be merged to \`main\`"
            echo "- requires a separate manual \`Publish Release / ${RELEASE_NAME}\` run after merge"
            echo "RELEASE_PR_BODY"
          } >> "${GITHUB_OUTPUT}"

      - name: Create release PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(release): ${{ steps.version.outputs.release_version }}"
          title: "chore(release): ${{ steps.version.outputs.release_version }}"
          body: ${{ steps.pr_body.outputs.body }}
          branch: "release/${{ steps.version.outputs.release_version }}"
          delete-branch: true
