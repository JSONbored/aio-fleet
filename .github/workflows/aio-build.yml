name: Reusable AIO Build

on:
  workflow_call:
    inputs:
      app_slug:
        required: true
        type: string
      image_name:
        required: true
        type: string
      workflow_title:
        required: false
        default: AIO Build
        type: string
      docker_cache_scope:
        required: true
        type: string
      pytest_image_tag:
        required: true
        type: string
      publish_profile:
        required: true
        type: string
      upstream_name:
        required: true
        type: string
      image_description:
        required: true
        type: string
      python_version:
        required: false
        default: "3.13"
        type: string
      trunk_org_slug:
        required: false
        default: aethereal
        type: string
      registry:
        required: false
        default: ghcr.io
        type: string
      publish_platforms:
        required: false
        default: linux/amd64,linux/arm64
        type: string
      checkout_submodules:
        required: false
        default: false
        type: boolean
      integration_pytest_args:
        required: false
        default: tests/integration -m integration
        type: string
      unit_pytest_args:
        required: false
        default: tests/unit tests/template
        type: string
      run_extended_integration:
        required: false
        default: false
        type: boolean
      extended_integration_pytest_args:
        required: false
        default: ""
        type: string
      generator_check_command:
        required: false
        default: ""
        type: string
      xml_paths:
        required: false
        default: ""
        type: string
      extra_publish_paths:
        required: false
        default: ""
        type: string
      catalog_assets:
        required: false
        default: ""
        type: string
      upstream_digest_arg:
        required: false
        default: UPSTREAM_IMAGE_DIGEST
        type: string
      agent_image_name:
        required: false
        default: ""
        type: string
      agent_docker_cache_scope:
        required: false
        default: ""
        type: string
      agent_pytest_image_tag:
        required: false
        default: ""
        type: string
      agent_integration_pytest_args:
        required: false
        default: ""
        type: string
      agent_context:
        required: false
        default: ""
        type: string
      agent_dockerfile:
        required: false
        default: ""
        type: string
      agent_upstream_name:
        required: false
        default: ""
        type: string
      agent_image_description:
        required: false
        default: ""
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ inputs.registry }}
  IMAGE_NAME: ${{ inputs.image_name }}
  AGENT_IMAGE_NAME: ${{ inputs.agent_image_name }}
  PYTHON_VERSION: ${{ inputs.python_version }}
  TRUNK_ORG_URL_SLUG: ${{ inputs.trunk_org_slug }}
  DOCKER_CACHE_SCOPE: ${{ inputs.docker_cache_scope }}
  AGENT_DOCKER_CACHE_SCOPE: ${{ inputs.agent_docker_cache_scope }}

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_related: ${{ steps.filter.outputs.build_related }}
      aio_related: ${{ steps.filter.outputs.aio_related }}
      agent_related: ${{ steps.filter.outputs.agent_related }}
      xml_related: ${{ steps.filter.outputs.xml_related }}
      renovate_related: ${{ steps.filter.outputs.renovate_related }}
      tooling_related: ${{ steps.filter.outputs.tooling_related }}
      workflow_related: ${{ steps.filter.outputs.workflow_related }}
      publish_related: ${{ steps.filter.outputs.publish_related }}
      aio_publish_related: ${{ steps.filter.outputs.aio_publish_related }}
      agent_publish_related: ${{ steps.filter.outputs.agent_publish_related }}
      run_tests_requested: ${{ steps.filter.outputs.run_tests_requested }}
      publish_requested: ${{ steps.filter.outputs.publish_requested }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: ${{ inputs.checkout_submodules }}

      - name: Classify changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          PUBLISH_PROFILE: ${{ inputs.publish_profile }}
          XML_PATHS: ${{ inputs.xml_paths }}
          EXTRA_PUBLISH_PATHS: ${{ inputs.extra_publish_paths }}
        run: |
          set -euo pipefail

          case "${EVENT_NAME}:${GITHUB_REF_VALUE}" in
            push:refs/heads/main)
              {
                echo "run_tests_requested=true"
                echo "publish_requested=true"
              } >> "${GITHUB_OUTPUT}"
              ;;
            pull_request:*|workflow_dispatch:*)
              {
                echo "run_tests_requested=true"
                echo "publish_requested=false"
              } >> "${GITHUB_OUTPUT}"
              ;;
            *)
              {
                echo "run_tests_requested=false"
                echo "publish_requested=false"
              } >> "${GITHUB_OUTPUT}"
              ;;
          esac

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
            head="${HEAD_SHA}"
          else
            base="${BEFORE_SHA}"
            head="${GITHUB_SHA_VALUE}"
          fi

          status="ok"
          changed_files=""
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            status="manual"
          elif ! git rev-parse --git-dir >/dev/null 2>&1; then
            status="fallback"
          elif [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
            changed_files="$(git show --pretty='' --name-only "${head}" 2>/dev/null)" || status="fallback"
          else
            changed_files="$(git diff --name-only "${base}" "${head}" 2>/dev/null)" || status="fallback"
          fi

          if [[ -n "${changed_files}" ]]; then
            printf 'Changed files:\n%s\n' "${changed_files}"
          fi

          CLASSIFY_STATUS="${status}" CHANGED_FILES="${changed_files}" python3 - <<'PY'
          from __future__ import annotations

          import fnmatch
          import os
          import subprocess
          from pathlib import Path

          def lines(name: str) -> list[str]:
              value = os.environ.get(name, "")
              return [line.strip() for line in value.splitlines() if line.strip()]

          def emit(values: dict[str, bool]) -> None:
              with Path(os.environ["GITHUB_OUTPUT"]).open("a") as output:
                  for key, value in values.items():
                      output.write(f"{key}={str(value).lower()}\n")

          def match(path: str, patterns: list[str]) -> bool:
              return any(fnmatch.fnmatch(path, pattern) for pattern in patterns)

          def run_text(command: list[str]) -> str:
              try:
                  return subprocess.check_output(command, text=True, stderr=subprocess.DEVNULL).strip()
              except Exception:
                  return ""

          profile = os.environ["PUBLISH_PROFILE"]
          status = os.environ["CLASSIFY_STATUS"]
          changed = [line for line in os.environ.get("CHANGED_FILES", "").splitlines() if line]

          outputs = {
              "build_related": False,
              "aio_related": False,
              "agent_related": False,
              "xml_related": False,
              "renovate_related": False,
              "tooling_related": False,
              "workflow_related": False,
              "publish_related": False,
              "aio_publish_related": False,
              "agent_publish_related": False,
          }

          if status == "manual":
              outputs.update(
                  build_related=True,
                  aio_related=True,
                  agent_related=profile == "signoz-suite",
                  xml_related=True,
                  renovate_related=True,
                  tooling_related=True,
                  workflow_related=True,
              )
              emit(outputs)
              raise SystemExit

          if status == "fallback":
              outputs.update(
                  build_related=True,
                  aio_related=True,
                  agent_related=profile == "signoz-suite",
                  xml_related=True,
                  renovate_related=True,
                  tooling_related=True,
                  workflow_related=True,
                  publish_related=True,
                  aio_publish_related=True,
                  agent_publish_related=profile == "signoz-suite",
              )
              emit(outputs)
              raise SystemExit

          publish_paths = ["Dockerfile", "upstream.toml", "rootfs/**", *lines("EXTRA_PUBLISH_PATHS")]
          build_paths = [
              "pyproject.toml",
              "requirements-dev.txt",
              "components.toml",
              "components/**",
              "docs/upstream/**",
              "tests/integration/**",
              "tests/integration_agent/**",
              "tests/helpers.py",
              "tests/conftest.py",
          ]
          xml_paths = lines("XML_PATHS")
          tooling_paths = ["cliff.toml", "scripts/**", ".trunk/**", "tests/**"]
          workflow_paths = [".github/actions/**", ".github/workflows/**"]

          for path in changed:
              if profile == "signoz-suite":
                  if match(path, ["Dockerfile", "upstream.toml", "rootfs/**"]):
                      outputs["aio_related"] = True
                      outputs["build_related"] = True
                      outputs["aio_publish_related"] = True
                  elif match(path, ["tests/integration/**"]):
                      outputs["aio_related"] = True
                      outputs["build_related"] = True
                  elif path == "components.toml":
                      outputs["aio_related"] = True
                      outputs["agent_related"] = True
                      outputs["build_related"] = True
                      outputs["aio_publish_related"] = True
                      outputs["agent_publish_related"] = True
                  elif match(path, ["components/**"]):
                      outputs["agent_related"] = True
                      outputs["build_related"] = True
                      outputs["agent_publish_related"] = True
                  elif match(path, ["tests/integration_agent/**"]):
                      outputs["agent_related"] = True
                      outputs["build_related"] = True
                  elif match(path, xml_paths):
                      outputs["xml_related"] = True
                      outputs["aio_related"] = True
                      outputs["agent_related"] = outputs["agent_related"] or "agent" in path
              else:
                  if match(path, publish_paths):
                      outputs["build_related"] = True
                      outputs["publish_related"] = True
                  elif match(path, build_paths):
                      outputs["build_related"] = True
                  elif match(path, xml_paths):
                      outputs["xml_related"] = True

              if path == "CHANGELOG.md":
                  outputs["tooling_related"] = True
                  if profile == "signoz-suite":
                      latest = run_text(["python3", "scripts/release.py", "latest-changelog-version"])
                      aio_upstream = run_text(["python3", "scripts/release.py", "upstream-version"])
                      agent_upstream = run_text(["python3", "scripts/release.py", "--component", "signoz-agent", "upstream-version"])
                      if latest.startswith(f"{aio_upstream}-aio."):
                          outputs["aio_publish_related"] = True
                      elif latest.startswith(f"{agent_upstream}-agent."):
                          outputs["agent_publish_related"] = True
                      else:
                          outputs["aio_publish_related"] = True
                          outputs["agent_publish_related"] = True
                  else:
                      outputs["publish_related"] = True

              if match(path, tooling_paths):
                  outputs["tooling_related"] = True
              if match(path, workflow_paths):
                  outputs["tooling_related"] = True
                  outputs["workflow_related"] = True
              if path == "renovate.json":
                  outputs["renovate_related"] = True

          if profile != "signoz-suite":
              outputs["aio_related"] = outputs["build_related"] or outputs["xml_related"]
              outputs["aio_publish_related"] = outputs["publish_related"]
          emit(outputs)
          PY

  validate-template:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true' || needs.detect-changes.outputs.renovate_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: ${{ inputs.checkout_submodules }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate shell and python scripts
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
        run: |
          set -euo pipefail
          bash -n scripts/validate-derived-repo.sh
          PYTHONPYCACHEPREFIX="/tmp/${{ inputs.app_slug }}-pyc" python3 -m py_compile scripts/*.py
          if [[ -d rootfs ]]; then
            find rootfs -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
            find rootfs -type f -path '*/run' -print0 | xargs -0 -r -n1 bash -n
            find rootfs -type f -path '*/up' -print0 | xargs -0 -r -n1 sh -n
          fi
          if [[ -d components ]]; then
            find components -type f -path '*/rootfs/*' -print0 | xargs -0 -r -n1 bash -n
          fi

      - name: Validate generated template
        if: ${{ inputs.generator_check_command != '' && (needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true') }}
        run: ${{ inputs.generator_check_command }}

      - name: Validate XML
        if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true' }}
        run: python3 scripts/validate-template.py --all

      - name: Validate derived repo placeholders
        run: |
          chmod +x scripts/validate-derived-repo.sh
          ./scripts/validate-derived-repo.sh .

      - name: Validate Renovate config
        if: ${{ needs.detect-changes.outputs.renovate_related == 'true' }}
        run: npx --yes --package renovate renovate-config-validator renovate.json

  pinned-actions:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Skip when workflow files are unchanged
        if: ${{ needs.detect-changes.outputs.workflow_related != 'true' }}
        run: echo "Workflow files unchanged; skipping pinned action scan."

      - name: Checkout
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enforce pinned action SHAs
        if: ${{ needs.detect-changes.outputs.workflow_related == 'true' }}
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          workflow_paths = [
              *pathlib.Path(".github/workflows").glob("*.yml"),
              *pathlib.Path(".github/actions").glob("*/action.yml"),
          ]
          pattern = re.compile(r"^\s*uses:\s*([^@\s]+)@([^\s#]+)")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          failures = []

          for path in sorted(workflow_paths):
              for lineno, line in enumerate(path.read_text().splitlines(), start=1):
                  match = pattern.match(line)
                  if not match:
                      continue
                  target, ref = match.groups()
                  if target.startswith("./"):
                      continue
                  if not sha_pattern.fullmatch(ref):
                      failures.append(f"{path}:{lineno}: action is not pinned to a full SHA -> {line.strip()}")

          if failures:
              print("\n".join(failures), file=sys.stderr)
              sys.exit(1)
          print("All workflow actions are pinned to full commit SHAs.")
          PY

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Detect dependency review support
        id: support
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          support_state="$(
            gh api "repos/${GITHUB_REPOSITORY}" \
              --jq 'if .security_and_analysis == null then "unsupported" else "supported" end'
          )"

          if [[ "${support_state}" == "supported" ]]; then
            echo "supported=true" >> "${GITHUB_OUTPUT}"
          else
            echo "supported=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip when dependency review is unsupported
        if: ${{ steps.support.outputs.supported != 'true' }}
        run: echo "Dependency review is unsupported for this repository; skipping."

      - name: Dependency review
        if: ${{ steps.support.outputs.supported == 'true' }}
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  unit-tests:
    if: ${{ needs.detect-changes.outputs.build_related == 'true' || needs.detect-changes.outputs.xml_related == 'true' || needs.detect-changes.outputs.tooling_related == 'true' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: ${{ inputs.checkout_submodules }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run unit and template tests
        id: unit_pytest
        run: |
          mkdir -p reports
          rm -f reports/pytest-unit.xml
          set +e
          python -m pytest \
            ${{ inputs.unit_pytest_args }} \
            --junit-xml=reports/pytest-unit.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload unit test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2.0.8
        env:
          TRUNK_API_TOKEN: ${{ env.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-unit.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Fail if unit tests failed
        if: ${{ steps.unit_pytest.outputs.exit_code != '0' }}
        run: exit 1

  integration-tests:
    if: ${{ needs.detect-changes.outputs.run_tests_requested == 'true' && (needs.detect-changes.outputs.build_related == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true' && needs.detect-changes.outputs.aio_publish_related == 'true')) }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: ${{ inputs.checkout_submodules }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Prebuild pytest image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ inputs.pytest_image_tag }}
          cache-from: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DOCKER_CACHE_SCOPE }}

      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run integration tests
        id: integration_pytest
        env:
          AIO_PYTEST_USE_PREBUILT_IMAGE: "true"
        run: |
          mkdir -p reports
          rm -f reports/pytest-integration.xml
          set +e
          python -m pytest \
            ${{ inputs.integration_pytest_args }} \
            --junit-xml=reports/pytest-integration.xml \
            -o junit_family=xunit1
          status=$?
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload integration test results to Trunk
        if: ${{ always() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@95a0fb8b29e45b6068304261fb518644b426a803 # v2.0.8
        env:
          TRUNK_API_TOKEN: ${{ env.TRUNK_API_TOKEN }}
        with:
          junit-paths: reports/pytest-integration.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}

      - name: Fail if integration tests failed
        if: ${{ steps.integration_pytest.outputs.exit_code != '0' }}
        run: exit 1

      - name: Dump Docker diagnostics
        if: ${{ failure() }}
        run: |
          docker ps -a
          echo
          docker images

  agent-integration-tests:
    if: ${{ inputs.publish_profile == 'signoz-suite' && needs.detect-changes.outputs.run_tests_requested == 'true' && (((needs.detect-changes.outputs.agent_related == 'true' || needs.detect-changes.outputs.aio_related == 'true') && needs.detect-changes.outputs.build_related == 'true') || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true' && needs.detect-changes.outputs.agent_publish_related == 'true')) }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: ${{ inputs.checkout_submodules }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Prebuild AIO backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ inputs.pytest_image_tag }}
          cache-from: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DOCKER_CACHE_SCOPE }}
      - name: Prebuild pytest agent image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.agent_context }}
          file: ${{ inputs.agent_dockerfile }}
          platforms: linux/amd64
          load: true
          tags: ${{ inputs.agent_pytest_image_tag }}
          cache-from: type=gha,scope=${{ env.AGENT_DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.AGENT_DOCKER_CACHE_SCOPE }}

      - name: Install pytest
        run: python -m pip install -r requirements-dev.txt

      - name: Run agent integration tests
        id: agent_integration_pytest
        env:
          AIO_PYTEST_USE_PREBUILT_IMAGE: "true"
          SIGNOZ_AIO_IMAGE_TAG: ${{ inputs.pytest_image_tag }}
          SIGNOZ_AGENT_PYTEST_USE_PREBUILT_IMAGE: "true"
          SIGNOZ_AGENT_IMAGE_TAG: ${{ inputs.agent_pytest_image_tag }}
        run: |
          mkdir -p reports
          rm -f reports/pytest-agent-integration.xml
          set +e
          python -m pytest \
