  publish:
    if: ${{ inputs.publish_profile != 'signoz-suite' && needs.detect-changes.outputs.aio_publish_related == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.publish_requested == 'true' && needs.integration-tests.result == 'success' }}
    needs:
      - detect-changes
      - validate-template
      - pinned-actions
      - unit-tests
      - integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: ${{ inputs.checkout_submodules }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve Docker Hub publish settings
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
          DOCKERHUB_IMAGE_NAME_SECRET: ${{ secrets.DOCKERHUB_IMAGE_NAME }}
        run: |
          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

          resolved_image_name="${DOCKERHUB_IMAGE_NAME:-${DOCKERHUB_IMAGE_NAME_SECRET}}"
          if [[ -n "${resolved_image_name}" ]]; then
            echo "image_name=${resolved_image_name}" >> "${GITHUB_OUTPUT}"
          else
            echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          fi
      - name: Login to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute image tags and labels
        id: prep
        env:
          DOCKERHUB_ENABLED: ${{ steps.dockerhub.outputs.enabled }}
          DOCKERHUB_IMAGE_NAME: ${{ steps.dockerhub.outputs.image_name }}
          PUBLISH_PROFILE: ${{ inputs.publish_profile }}
          UPSTREAM_DIGEST_ARG: ${{ inputs.upstream_digest_arg }}
          UPSTREAM_NAME: ${{ inputs.upstream_name }}
          IMAGE_DESCRIPTION: ${{ inputs.image_description }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          set -euo pipefail

          image_ghcr="$(printf '%s' "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          dockerhub_image_name="${DOCKERHUB_IMAGE_NAME:-${IMAGE_NAME}}"
          image_dockerhub="$(printf '%s' "${dockerhub_image_name}" | tr '[:upper:]' '[:lower:]')"
          sha_tag_ghcr="${image_ghcr}:sha-${GITHUB_SHA}"
          upstream_version="$(python3 scripts/release.py upstream-version 2>/dev/null || true)"
          upstream_digest="$(sed -n "s/^ARG ${UPSTREAM_DIGEST_ARG}=//p" Dockerfile | head -n1)"
          changelog_version="$(python3 scripts/release.py latest-changelog-version 2>/dev/null || true)"
          release_target_commit="$(python3 scripts/release.py find-release-target-commit "${changelog_version}" 2>/dev/null || true)"
          release_package_tag=""
          version_label="${upstream_version}"
          wrapper_track="main"
          wrapper_version=""

          if [[ "${PUBLISH_PROFILE}" == "template" ]]; then
            version_label=""
          elif [[ "${changelog_version}" == "${upstream_version}"-aio.* && "${release_target_commit}" == "${GITHUB_SHA}" ]]; then
            candidate_revision="${changelog_version##*.}"
            if [[ "${candidate_revision}" =~ ^[0-9]+$ ]]; then
              if [[ "${PUBLISH_PROFILE}" == "upstream-aio-track" ]]; then
                wrapper_track="aio-v${candidate_revision}"
                release_package_tag="${upstream_version}-${wrapper_track}"
              else
                wrapper_track="aio-v${candidate_revision}"
                release_package_tag="${changelog_version}"
              fi
              version_label="${release_package_tag}"
              wrapper_version="${release_package_tag}"
            fi
          fi

          {
            echo "upstream_version=${upstream_version}"
            echo "upstream_digest=${upstream_digest}"
            echo "release_package_tag=${release_package_tag}"
            echo "version_label=${version_label}"
            echo "wrapper_track=${wrapper_track}"
            echo "wrapper_version=${wrapper_version}"
            echo "ghcr_source=${sha_tag_ghcr}"
            echo "ghcr_tags<<EOF"
            echo "${image_ghcr}:latest"
            if [[ -n "${upstream_version}" ]]; then
              echo "${image_ghcr}:${upstream_version}"
              if [[ -n "${release_package_tag}" ]]; then
                echo "${image_ghcr}:${release_package_tag}"
              fi
            fi
            echo "${sha_tag_ghcr}"
            echo "EOF"
            echo "dockerhub_tags<<EOF"
            if [[ "${DOCKERHUB_ENABLED}" == "true" ]]; then
              echo "${image_dockerhub}:latest"
              if [[ -n "${upstream_version}" ]]; then
                echo "${image_dockerhub}:${upstream_version}"
                if [[ -n "${release_package_tag}" ]]; then
                  echo "${image_dockerhub}:${release_package_tag}"
                fi
              fi
              echo "${image_dockerhub}:sha-${GITHUB_SHA}"
            fi
            echo "EOF"
            echo "labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.title=${APP_SLUG}"
            echo "org.opencontainers.image.version=${version_label}"
            echo "org.opencontainers.image.description=${IMAGE_DESCRIPTION}"
            echo "io.jsonbored.upstream.name=${UPSTREAM_NAME}"
            echo "io.jsonbored.upstream.version=${upstream_version}"
            echo "io.jsonbored.upstream.digest=${upstream_digest}"
            if [[ "${PUBLISH_PROFILE}" == "dify" ]]; then
              echo "io.jsonbored.upstream.dify.api.digest=$(sed -n 's/^ARG UPSTREAM_DIFY_API_DIGEST=//p' Dockerfile | head -n1)"
              echo "io.jsonbored.upstream.dify.web.digest=$(sed -n 's/^ARG UPSTREAM_DIFY_WEB_DIGEST=//p' Dockerfile | head -n1)"
              echo "io.jsonbored.upstream.dify_sandbox.version=$(sed -n 's/^ARG UPSTREAM_DIFY_SANDBOX_VERSION=//p' Dockerfile | head -n1)"
              echo "io.jsonbored.upstream.dify_sandbox.digest=$(sed -n 's/^ARG UPSTREAM_DIFY_SANDBOX_DIGEST=//p' Dockerfile | head -n1)"
              echo "io.jsonbored.upstream.dify_plugin_daemon.version=$(sed -n 's/^ARG UPSTREAM_DIFY_PLUGIN_DAEMON_VERSION=//p' Dockerfile | head -n1)"
              echo "io.jsonbored.upstream.dify_plugin_daemon.digest=$(sed -n 's/^ARG UPSTREAM_DIFY_PLUGIN_DAEMON_DIGEST=//p' Dockerfile | head -n1)"
            fi
            echo "io.jsonbored.wrapper.name=${APP_SLUG}"
            echo "io.jsonbored.wrapper.type=unraid-aio"
            echo "io.jsonbored.wrapper.track=${wrapper_track}"
            echo "io.jsonbored.wrapper.version=${wrapper_version}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Build and push GHCR image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: ${{ inputs.publish_platforms }}
          push: true
          cache-from: type=gha,scope=${{ env.DOCKER_CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.DOCKER_CACHE_SCOPE }}
          tags: ${{ steps.prep.outputs.ghcr_tags }}
          labels: ${{ steps.prep.outputs.labels }}
      - name: Install Docker Hub mirror tooling
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends skopeo
      - name: Mirror GHCR image to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        env:
          DOCKERHUB_TAGS: ${{ steps.prep.outputs.dockerhub_tags }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GHCR_SOURCE_TAG: ${{ steps.prep.outputs.ghcr_source }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set -euo pipefail

          if [[ -z "${DOCKERHUB_TAGS}" ]]; then
            echo "Docker Hub publishing is enabled but no Docker Hub tags were computed." >&2
            exit 1
          fi

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            echo "Mirroring ${GHCR_SOURCE_TAG} to ${tag}"
            skopeo copy --all --retry-times 3 \
              --src-creds "${GHCR_USERNAME}:${GHCR_TOKEN}" \
              --dest-creds "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" \
              "docker://${GHCR_SOURCE_TAG}" \
              "docker://${tag}"
          done <<< "${DOCKERHUB_TAGS}"
      - name: Verify Docker Hub tags
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        env:
          DOCKERHUB_TAGS: ${{ steps.prep.outputs.dockerhub_tags }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [[ -z "${tag}" ]] && continue
            echo "Verifying ${tag}"
            skopeo inspect --raw \
              --creds "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" \
              "docker://${tag}" >/dev/null
          done <<< "${DOCKERHUB_TAGS}"

