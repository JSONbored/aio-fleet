          set -euo pipefail

          cd target-repo
          branch="sync-awesome-unraid/${APP_SLUG}"
          title="ci(sync): sync ${APP_SLUG} catalog assets"
          body="Automated sync from \`${SOURCE_REPOSITORY}\`."
          paths=()
          while IFS='|' read -r _source target; do
            [[ -z "${target}" ]] && continue
            paths+=("${target}")
          done <<< "${CATALOG_ASSETS}"

          if [[ "${#paths[@]}" -eq 0 ]]; then
            echo "No catalog assets configured."
            exit 0
          fi
          if [[ -z "$(git status --porcelain -- "${paths[@]}")" ]]; then
            echo "No awesome-unraid changes to sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${branch}"
          git add "${paths[@]}"
          git commit -m "ci(sync): auto-sync ${APP_SLUG} catalog assets"
          git push --force origin "HEAD:${branch}"

          existing_pr="$(gh pr list \
            --repo JSONbored/awesome-unraid \
            --head "${branch}" \
            --base main \
            --json number \
            --jq '.[0].number // empty')"

          if [[ -n "${existing_pr}" ]]; then
            gh pr edit "${existing_pr}" \
              --repo JSONbored/awesome-unraid \
              --title "${title}" \
              --body "${body}"
          else
            gh pr create \
              --repo JSONbored/awesome-unraid \
              --head "${branch}" \
              --base main \
              --title "${title}" \
              --body "${body}"
          fi
