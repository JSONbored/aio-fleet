name: Publish AIO Base Overlay

# Builds and publishes the shared s6-overlay + hardening stage (infra/aio-base)
# that the fleet's app images consume via `COPY --from=jsonbored/aio-base:...`.
# Multi-arch and gated behind the protected registry-publish environment, like
# the app publish path.
#checkov:skip=CKV_GHA_7:workflow_dispatch has no privileged inputs beyond the gated publish itself
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - infra/aio-base/**
      - .github/workflows/aio-base.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE: jsonbored/aio-base
  TAG: s6-3.2.1.0

jobs:
  publish-aio-base:
    runs-on: ubuntu-latest
    environment: registry-publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Enforce trusted ref
        env:
          EXPECTED_REF: refs/heads/${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "${EXPECTED_REF}" ]]; then
            echo "aio-base publish is restricted to ${EXPECTED_REF}; got ${GITHUB_REF}." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PUBLISH_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: infra/aio-base
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
            ghcr.io/${{ env.IMAGE }}:${{ env.TAG }}
            ghcr.io/${{ env.IMAGE }}:latest
