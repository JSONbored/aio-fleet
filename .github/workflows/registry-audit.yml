name: Registry Audit

#checkov:skip=CKV_GHA_7:workflow_dispatch input only controls whether this reporting job fails after read-only verification
on:
  schedule:
    - cron: 37 9 * * *
  workflow_dispatch:
    inputs:
      fail_on_missing:
        description: Fail the run if any expected registry tag is missing
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  registry-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install aio-fleet
        run: python -m pip install -e ".[dev]"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Resolve GitHub App token
        id: app-token
        env:
          AIO_FLEET_APP_ID: ${{ secrets.AIO_FLEET_APP_ID }}
          AIO_FLEET_APP_INSTALLATION_ID: ${{ secrets.AIO_FLEET_APP_INSTALLATION_ID }}
          AIO_FLEET_APP_PRIVATE_KEY: ${{ secrets.AIO_FLEET_APP_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          token="$(python -m aio_fleet.github_app --fallback-env GITHUB_TOKEN)"
          if [[ -z "${token}" ]]; then
            echo "Unable to resolve a GitHub token for registry audit checkouts" >&2
            exit 1
          fi
          echo "::add-mask::${token}"
          printf 'token=%s\n' "${token}" >> "${GITHUB_OUTPUT}"

      - name: Verify registry tags
        id: verify
        #checkov:skip=CKV_SECRET_6:the script handles a masked runtime GitHub App token for checkout auth
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          manifest = yaml.safe_load(Path("fleet.yml").read_text())
          owner = manifest["owner"]
          checkout_root = Path("registry-checkouts")
          checkout_root.mkdir(exist_ok=True)
          token = "${{ steps.app-token.outputs.token }}"
          auth = base64.b64encode(f"x-access-token:{token}".encode()).decode()
          clone_env = {
              key: os.environ[key]
              for key in ("HOME", "PATH", "SSL_CERT_FILE", "REQUESTS_CA_BUNDLE")
              if key in os.environ
          }
          clone_env.update(
              {
                  "GIT_CONFIG_COUNT": "1",
                  "GIT_CONFIG_KEY_0": "http.https://github.com/.extraheader",
                  "GIT_CONFIG_VALUE_0": f"AUTHORIZATION: basic {auth}",
              }
          )
          verify_env = {
              key: os.environ[key]
              for key in (
                  "DOCKER_CONFIG",
                  "HOME",
                  "PATH",
                  "SSL_CERT_FILE",
                  "REQUESTS_CA_BUNDLE",
                  "XDG_RUNTIME_DIR",
              )
              if key in os.environ
          }
          report = {"repos": []}
          status = 0

          for repo, repo_config in manifest["repos"].items():
              if repo_config.get("publish_profile") == "template":
                  report["repos"].append(
                      {
                          "repo": repo,
                          "sha": "",
                          "dockerhub": [],
                          "ghcr": [],
                          "failures": [],
                          "skipped": "manual-template-publish",
                      }
                  )
                  continue
              worktree = checkout_root / repo
              if worktree.exists():
                  shutil.rmtree(worktree)
              clone = subprocess.run(
                  [
                      "git",
                      "clone",
                      f"https://github.com/{owner}/{repo}.git",
                      str(worktree),
                  ],
                  env=clone_env,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              if clone.returncode != 0:
                  status = 1
                  detail = (clone.stderr or clone.stdout).strip() or "clone failed"
                  report["repos"].append(
                      {
                          "repo": repo,
                          "sha": "",
                          "dockerhub": [],
                          "ghcr": [],
                          "failures": [detail],
                      }
                  )
                  continue

              sha = subprocess.check_output(
                  ["git", "-C", str(worktree), "rev-parse", "HEAD"],
                  env=verify_env,
                  text=True,
              ).strip()
              components = ["aio"]
              component_config = repo_config.get("components")
              if isinstance(component_config, dict):
                  components = [
                      name
                      for name, config in component_config.items()
                      if name == "aio"
                      or (isinstance(config, dict) and config.get("image_name"))
                  ] or ["aio"]
              for component in components:
                  verify = subprocess.run(
                      [
                          sys.executable,
                          "-m",
                          "aio_fleet",
                          "registry",
                          "verify",
                          "--repo",
                          repo,
                          "--repo-path",
                          str(worktree),
                          "--sha",
                          sha,
                          "--component",
                          component,
                          "--format",
                          "json",
                      ],
                      env=verify_env,
                      check=False,
                      text=True,
                      capture_output=True,
                  )
                  if verify.stderr:
                      print(verify.stderr, file=sys.stderr, end="")
                  if verify.returncode != 0:
                      status = 1
                  try:
                      parsed = json.loads(verify.stdout)
                  except json.JSONDecodeError:
                      status = 1
                      report["repos"].append(
                          {
                              "repo": repo,
                              "component": component,
                              "sha": sha,
                              "dockerhub": [],
                              "ghcr": [],
                              "failures": [
                                  (verify.stdout or verify.stderr).strip()
                                  or "registry verify produced invalid JSON"
                              ],
                          }
                      )
                      continue
                  report["repos"].extend(parsed.get("repos", []))

          Path("registry-report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"status={status}\n")
          PY

      - name: Publish registry summary
        env:
          VERIFY_STATUS: ${{ steps.verify.outputs.status }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("registry-report.json")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          status = os.environ.get("VERIFY_STATUS", "")
          lines = ["# Registry Audit", "", f"Verify command exit status: `{status}`", ""]
          if not report_path.exists():
              lines.extend(["Registry report was not generated.", ""])
              summary_path.write_text("\n".join(lines))
              raise SystemExit(0)

          report = json.loads(report_path.read_text())
          lines.extend(
              [
                  "| Repo | Component | SHA | State | Docker Hub tags | GHCR tags |",
                  "| --- | --- | --- | --- | ---: | ---: |",
              ]
          )
          failures = []
          for item in report.get("repos", []):
              repo_failures = item.get("failures", [])
              state = (
                  f"skipped:{item['skipped']}"
                  if item.get("skipped")
                  else "failed" if repo_failures else "ok"
              )
              sha = str(item.get("sha", ""))[:12]
              lines.append(
                  "| {repo} | {component} | `{sha}` | {state} | {dockerhub} | {ghcr} |".format(
                      repo=item.get("repo", ""),
                      component=item.get("component", "aio"),
                      sha=sha,
                      state=state,
                      dockerhub=len(item.get("dockerhub", [])),
                      ghcr=len(item.get("ghcr", [])),
                  )
              )
              for failure in repo_failures:
                  failures.append(f"{item.get('repo', '')}: {failure}")

          if failures:
              lines.extend(["", "## Missing Or Failed Tags", ""])
              lines.extend(f"- `{failure}`" for failure in failures)
          else:
              lines.extend(["", "All expected registry tags resolved."])
          summary_path.write_text("\n".join(lines) + "\n")
          PY

      - name: Alert registry audit
        if: ${{ always() }}
        env:
          AIO_FLEET_KUMA_PUSH_URL: ${{ secrets.AIO_FLEET_KUMA_PUSH_URL }}
          AIO_FLEET_ALERT_WEBHOOK_URL: ${{ secrets.AIO_FLEET_ALERT_WEBHOOK_URL }}
          DETAILS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          if [[ -f registry-report.json ]]; then
            python -m aio_fleet alert send \
              --event registry-audit \
              --report-json registry-report.json \
              --details-url "${DETAILS_URL}" \
              --format json
          else
            python -m aio_fleet alert send \
              --event registry-audit \
              --status failure \
              --summary "Registry audit did not produce a report" \
              --details-url "${DETAILS_URL}" \
              --format json
          fi
          exit 0

      - name: Enforce manual registry audit
        env:
          FAIL_ON_MISSING: ${{ github.event_name == 'workflow_dispatch' && inputs.fail_on_missing || false }}
          VERIFY_STATUS: ${{ steps.verify.outputs.status }}
        run: |
          set -euo pipefail
          if [[ "${FAIL_ON_MISSING}" == "true" && "${VERIFY_STATUS}" != "0" ]]; then
            echo "Registry audit found missing or failed tags." >&2
            exit 1
          fi
