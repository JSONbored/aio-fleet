name: AIO Fleet Control Plane

#checkov:skip=CKV_GHA_7:workflow_dispatch inputs are the intentional control-plane entry point; repo and sha are validated before checkout
#checkov:skip=CKV_SECRET_6:poll checkout auth is a runtime-generated masked GitHub App token, not a literal secret
on:
  schedule:
    - cron: 17 * * * *
    - cron: 43 10 * * *
  issues:
    types:
      - edited
  workflow_dispatch:
    inputs:
      mode:
        description: Control-plane mode
        required: true
        default: poll
        type: choice
        options:
          - poll
          - control-check
          - upstream-monitor
          - fleet-dashboard
      repo:
        description: App repo name for control-check mode
        required: false
        default: ""
      sha:
        description: App commit SHA for control-check mode
        required: false
        default: ""
      event:
        description: Event policy for control-check mode
        required: false
        default: pull_request
        type: choice
        options:
          - pull_request
          - push
          - release
          - workflow_dispatch
      publish:
        description: Include registry publish step in control-check mode
        required: false
        default: false
        type: boolean
      create_checks:
        description: Create queued checks during poll mode
        required: false
        default: false
        type: boolean
      dry_run:
        description: Print actions without mutating GitHub or registries
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  checks: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ inputs.repo || github.ref }}
  cancel-in-progress: false

jobs:
  control-plane:
    runs-on: ubuntu-latest
    outputs:
      poll_targets: ${{ steps.poll.outputs.targets }}
      poll_run_checks: ${{ steps.poll.outputs.run_checks }}
      poll_has_targets: ${{ steps.poll.outputs.has_targets }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AIO_FLEET_APP_ID: ${{ secrets.AIO_FLEET_APP_ID }}
      AIO_FLEET_APP_INSTALLATION_ID: ${{ secrets.AIO_FLEET_APP_INSTALLATION_ID }}
      AIO_FLEET_APP_PRIVATE_KEY: ${{ secrets.AIO_FLEET_APP_PRIVATE_KEY }}
      AIO_FLEET_CHECK_TOKEN: ${{ secrets.AIO_FLEET_CHECK_TOKEN }}
      AIO_FLEET_GHCR_TOKEN: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}
      AIO_FLEET_KUMA_PUSH_URL: ${{ secrets.AIO_FLEET_KUMA_PUSH_URL }}
      AIO_FLEET_ALERT_WEBHOOK_URL: ${{ secrets.AIO_FLEET_ALERT_WEBHOOK_URL }}
    steps:
      - name: Checkout aio-fleet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install aio-fleet
        run: python -m pip install -e ".[dev]"

      - name: Install Trunk
        uses: trunk-io/trunk-action/setup@75699af9e26881e564e9d832ef7dc3af25ec031b # v1

      - name: Resolve GitHub App token
        id: app-token
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'issues' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          token="$(python -m aio_fleet.github_app --fallback-env GITHUB_TOKEN)"
          if [[ -z "${token}" ]]; then
            echo "Unable to resolve a GitHub token for app checkout" >&2
            exit 1
          fi
          echo "::add-mask::${token}"
          printf 'token=%s\n' "${token}" >> "${GITHUB_OUTPUT}"

      - name: Read dashboard issue controls
        id: dashboard-controls
        if: ${{ github.event_name == 'issues' && github.event.action == 'edited' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -m aio_fleet fleet-dashboard commands \
            --issue-repo "${{ github.repository }}" \
            --issue-number "${{ github.event.issue.number }}" \
            --format github-output >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' && inputs.publish && !inputs.dry_run }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' && inputs.publish && !inputs.dry_run }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate publish credentials
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' && inputs.publish && !inputs.dry_run }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AIO_FLEET_GHCR_TOKEN: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are required for central publish." >&2
            exit 1
          fi
          if [[ -z "${AIO_FLEET_GHCR_TOKEN}" ]]; then
            echo "AIO_FLEET_GHCR_TOKEN is required for central GHCR publish." >&2
            exit 1
          fi

      - name: Login to Docker Hub
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' && inputs.publish && !inputs.dry_run }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' && inputs.publish && !inputs.dry_run }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}

      - name: Poll active repos
        id: poll
        if: ${{ github.event.schedule == '17 * * * *' || inputs.mode == 'poll' }}
        env:
          CREATE_CHECKS: ${{ github.event_name == 'workflow_dispatch' && inputs.create_checks || false }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          RUN_CHECKS: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          AIO_FLEET_CHECK_TOKEN: ${{ steps.app-token.outputs.token }}
        #checkov:skip=CKV_SECRET_6:the script handles a masked runtime GitHub App token for checkout auth
        run: |
          set -euo pipefail
          args=(poll --format json)
          if [[ "${RUN_CHECKS}" == "true" ]]; then
            args+=(--missing-checks-only)
          fi
          if [[ "${CREATE_CHECKS}" == "true" && "${RUN_CHECKS}" != "true" ]]; then
            args+=(--create-checks)
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m aio_fleet "${args[@]}" | tee poll-targets.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path("poll-targets.json").read_text())
          targets = payload.get("targets", [])
          run_checks = os.environ.get("RUN_CHECKS") == "true"
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a") as handle:
              handle.write(f"run_checks={'true' if run_checks else 'false'}\n")
              handle.write(f"has_targets={'true' if targets else 'false'}\n")
              handle.write("targets<<__AIO_FLEET_TARGETS__\n")
              handle.write(json.dumps(targets, sort_keys=True))
              handle.write("\n__AIO_FLEET_TARGETS__\n")
          if run_checks and not targets:
              print("No missing aio-fleet checks found.")
          PY

      - name: Monitor upstream releases
        if: ${{ github.event.schedule == '43 10 * * *' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'upstream-monitor') || steps.dashboard-controls.outputs.upstream_monitor == 'true' }}
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          AIO_FLEET_CHECK_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          MUTATE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) || steps.dashboard-controls.outputs.upstream_monitor == 'true' }}
        #checkov:skip=CKV_SECRET_6:the script handles a masked runtime GitHub App token for checkout and PR creation
        run: |
          set -euo pipefail
          if [[ -z "${APP_TOKEN}" ]]; then
            echo "Unable to resolve a GitHub App token for upstream monitoring" >&2
            exit 1
          fi
          python - <<'PY'
          import base64
          import json
          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          import yaml

          manifest = yaml.safe_load(Path("fleet.yml").read_text())
          owner = manifest["owner"]
          token = os.environ["APP_TOKEN"]
          auth = base64.b64encode(f"x-access-token:{token}".encode()).decode()
          checkout_root = Path("upstream-checkouts")
          checkout_root.mkdir(exist_ok=True)
          report = {"repos": []}
          status = 0

          for repo, repo_config in manifest["repos"].items():
              if repo_config.get("publish_profile") == "template":
                  report["repos"].append({"repo": repo, "skipped": "manual-template"})
                  continue
              worktree = checkout_root / repo
              if worktree.exists():
                  shutil.rmtree(worktree)
              clone = subprocess.run(
                  [
                      "git",
                      "-c",
                      f"http.https://github.com/.extraheader=AUTHORIZATION: basic {auth}",
                      "clone",
                      f"https://github.com/{owner}/{repo}.git",
                      str(worktree),
                  ],
                  check=False,
                  text=True,
                  capture_output=True,
              )
              if clone.returncode != 0:
                  status = 1
                  report["repos"].append(
                      {
                          "repo": repo,
                          "error": (clone.stderr or clone.stdout).strip() or "clone failed",
                      }
                  )
                  continue
              subprocess.run(
                  [
                      "git",
                      "-C",
                      str(worktree),
                      "config",
                      "http.https://github.com/.extraheader",
                      f"AUTHORIZATION: basic {auth}",
                  ],
                  check=True,
              )
              subprocess.run(
                  ["git", "-C", str(worktree), "submodule", "update", "--init", "--recursive"],
                  check=True,
              )
              args = [
                  sys.executable,
                  "-m",
                  "aio_fleet",
                  "upstream",
                  "monitor",
                  "--repo",
                  repo,
                  "--repo-path",
                  str(worktree),
                  "--format",
                  "json",
              ]
              if os.environ.get("MUTATE") == "true":
                  args.extend(["--write", "--create-pr", "--post-check"])
              if os.environ.get("DRY_RUN") == "true":
                  args.append("--dry-run")
              run = subprocess.run(
                  args,
                  check=False,
                  text=True,
                  capture_output=True,
              )
              if run.stderr:
                  print(run.stderr, file=sys.stderr, end="")
              if run.returncode != 0:
                  status = 1
              try:
                  parsed = json.loads(run.stdout)
              except json.JSONDecodeError:
                  status = 1
                  report["repos"].append(
                      {
                          "repo": repo,
                          "error": (run.stdout or run.stderr).strip()
                          or "upstream monitor produced invalid JSON",
                      }
                  )
                  continue
              report["repos"].extend(parsed.get("repos", []))

          Path("upstream-report.json").write_text(
              json.dumps(report, indent=2, sort_keys=True) + "\n"
          )
          raise SystemExit(status)
          PY

      - name: Publish upstream summary
        if: ${{ always() && (github.event.schedule == '43 10 * * *' || inputs.mode == 'upstream-monitor') }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("upstream-report.json")
          if not report_path.exists():
              print("No upstream report was generated.")
              raise SystemExit(0)
          report = json.loads(report_path.read_text())
          lines = ["# Upstream Monitor", ""]
          for item in report.get("repos", []):
              repo = item.get("repo", "unknown")
              if item.get("skipped"):
                  lines.append(f"- `{repo}`: skipped ({item['skipped']})")
                  continue
              if item.get("error"):
                  lines.append(f"- `{repo}`: failed ({item['error']})")
                  continue
              updates = [
                  result
                  for result in item.get("results", [])
                  if result.get("updates_available")
              ]
              lines.append(f"- `{repo}`: {'updates available' if updates else 'current'}")
              for result in updates:
                  lines.append(
                      f"  - `{result['component']}`: {result['current_version']} -> {result['latest_version']}"
                  )
          Path("upstream-summary.md").write_text("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY

      - name: Checkout dashboard repos
        if: ${{ always() && (github.event.schedule == '43 10 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'upstream-monitor' || inputs.mode == 'fleet-dashboard')) || steps.dashboard-controls.outputs.rescan == 'true' || steps.dashboard-controls.outputs.upstream_monitor == 'true') }}
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        #checkov:skip=CKV_SECRET_6:the script handles a masked runtime GitHub App token for dashboard checkout auth
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import os
          import shutil
          import subprocess
          from pathlib import Path

          import yaml

          manifest = yaml.safe_load(Path("fleet.yml").read_text())
          owner = manifest["owner"]
          token = os.environ["APP_TOKEN"]
          auth = base64.b64encode(f"x-access-token:{token}".encode()).decode()
          checkout_root = Path("dashboard-checkouts").resolve()
          checkout_root.mkdir(exist_ok=True)
          refs = []

          for name, repo_config in manifest.get("repos", {}).items():
              path = checkout_root / name
              repo_config["path"] = str(path)
              refs.append(
                  (
                      name,
                      repo_config.get("github_repo", f"{owner}/{name}"),
                      path,
                  )
              )

          dashboard = manifest.get("dashboard", {})
          if isinstance(dashboard, dict):
              for group in ("destination_repos", "rehab_repos"):
                  for name, repo_config in dashboard.get(group, {}).items():
                      if not isinstance(repo_config, dict):
                          continue
                      path = checkout_root / name
                      repo_config["path"] = str(path)
                      if repo_config.get("catalog_path"):
                          repo_config["catalog_path"] = str(path)
                      refs.append(
                          (
                              name,
                              repo_config.get("github_repo", f"{owner}/{name}"),
                              path,
                          )
                      )

          seen = set()
          for name, github_repo, path in refs:
              key = (github_repo, str(path))
              if key in seen:
                  continue
              seen.add(key)
              if path.exists():
                  shutil.rmtree(path)
              path.parent.mkdir(parents=True, exist_ok=True)
              subprocess.run(
                  [
                      "git",
                      "-c",
                      f"http.https://github.com/.extraheader=AUTHORIZATION: basic {auth}",
                      "clone",
                      f"https://github.com/{github_repo}.git",
                      str(path),
                  ],
                  check=True,
              )
              submodules = subprocess.run(
                  [
                      "git",
                      "-C",
                      str(path),
                      "submodule",
                      "update",
                      "--init",
                      "--recursive",
                  ],
                  check=False,
                  text=True,
                  capture_output=True,
              )
              if submodules.returncode != 0:
                  detail = (submodules.stderr or submodules.stdout).strip()
                  print(f"submodule update skipped for {name}: {detail}")
              print(f"checked out {name} -> {path}")
          Path("fleet-dashboard.manifest.yml").write_text(
              yaml.safe_dump(manifest, sort_keys=False)
          )
          PY

      - name: Update fleet dashboard issue
        if: ${{ always() && (github.event.schedule == '43 10 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'upstream-monitor' || inputs.mode == 'fleet-dashboard')) || steps.dashboard-controls.outputs.rescan == 'true' || steps.dashboard-controls.outputs.upstream_monitor == 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          MUTATE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) || steps.dashboard-controls.outputs.rescan == 'true' || steps.dashboard-controls.outputs.upstream_monitor == 'true' }}
        run: |
          set -euo pipefail
          args=(fleet-dashboard update --format json)
          if [[ -f fleet-dashboard.manifest.yml ]]; then
            args=(--manifest fleet-dashboard.manifest.yml "${args[@]}")
          fi
          if [[ "${MUTATE}" == "true" ]]; then
            args+=(--write)
          else
            args+=(--dry-run)
          fi
          python -m aio_fleet "${args[@]}" | tee fleet-dashboard-report.json

      - name: Alert upstream monitor
        if: ${{ always() && (github.event.schedule == '43 10 * * *' || inputs.mode == 'upstream-monitor') }}
        env:
          DETAILS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          if [[ -f upstream-report.json ]]; then
            python -m aio_fleet alert send \
              --event upstream-monitor \
              --report-json upstream-report.json \
              --details-url "${DETAILS_URL}" \
              --format json
          else
            python -m aio_fleet alert send \
              --event upstream-monitor \
              --status failure \
              --summary "Upstream monitor did not produce a report" \
              --details-url "${DETAILS_URL}" \
              --format json
          fi
          exit 0

      - name: Validate control-check inputs
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' }}
        env:
          TARGET_REPO: ${{ inputs.repo }}
          TARGET_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          if [[ -z "${TARGET_REPO}" || -z "${TARGET_SHA}" ]]; then
            echo "repo and sha are required for control-check mode" >&2
            exit 1
          fi

      - name: Checkout app repo
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: JSONbored/${{ inputs.repo }}
          ref: ${{ inputs.sha }}
          path: app-repo
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Run central control check
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'control-check' }}
        env:
          TARGET_REPO: ${{ inputs.repo }}
          TARGET_SHA: ${{ inputs.sha }}
          TARGET_EVENT: ${{ inputs.event }}
          PUBLISH: ${{ inputs.publish }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(
            control-check
            --repo "${TARGET_REPO}"
            --repo-path app-repo
            --sha "${TARGET_SHA}"
            --event "${TARGET_EVENT}"
            --check-run
          )
          if [[ "${PUBLISH}" == "true" ]]; then
            args+=(--publish)
          fi
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python -m aio_fleet "${args[@]}"

      - name: Alert control-plane status
        if: ${{ always() }}
        env:
          DETAILS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          MODE: ${{ inputs.mode }}
        run: |
          set +e
          mode="${MODE:-${GITHUB_EVENT_NAME}}"
          python -m aio_fleet alert send \
            --event control-plane \
            --status "${JOB_STATUS}" \
            --summary "AIO Fleet Control Plane ${mode} ${JOB_STATUS}" \
            --details-url "${DETAILS_URL}" \
            --format json
          exit 0

  poll-checks:
    name: poll-check (${{ matrix.target.repo }})
    needs: control-plane
    if: ${{ needs.control-plane.outputs.poll_run_checks == 'true' && needs.control-plane.outputs.poll_has_targets == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.control-plane.outputs.poll_targets) }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AIO_FLEET_APP_ID: ${{ secrets.AIO_FLEET_APP_ID }}
      AIO_FLEET_APP_INSTALLATION_ID: ${{ secrets.AIO_FLEET_APP_INSTALLATION_ID }}
      AIO_FLEET_APP_PRIVATE_KEY: ${{ secrets.AIO_FLEET_APP_PRIVATE_KEY }}
      AIO_FLEET_CHECK_TOKEN: ${{ secrets.AIO_FLEET_CHECK_TOKEN }}
      AIO_FLEET_GHCR_TOKEN: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}
      AIO_FLEET_KUMA_PUSH_URL: ${{ secrets.AIO_FLEET_KUMA_PUSH_URL }}
      AIO_FLEET_ALERT_WEBHOOK_URL: ${{ secrets.AIO_FLEET_ALERT_WEBHOOK_URL }}
    steps:
      - name: Checkout aio-fleet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install aio-fleet
        run: python -m pip install -e ".[dev]"

      - name: Install Trunk
        uses: trunk-io/trunk-action/setup@75699af9e26881e564e9d832ef7dc3af25ec031b # v1

      - name: Resolve GitHub App token
        id: app-token
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          token="$(python -m aio_fleet.github_app --fallback-env GITHUB_TOKEN)"
          if [[ -z "${token}" ]]; then
            echo "Unable to resolve a GitHub token for app checkout" >&2
            exit 1
          fi
          echo "::add-mask::${token}"
          printf 'token=%s\n' "${token}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        if: ${{ matrix.target.publish == true }}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        if: ${{ matrix.target.publish == true }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate publish credentials
        if: ${{ matrix.target.publish == true }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          AIO_FLEET_GHCR_TOKEN: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are required for central publish." >&2
            exit 1
          fi
          if [[ -z "${AIO_FLEET_GHCR_TOKEN}" ]]; then
            echo "AIO_FLEET_GHCR_TOKEN is required for central GHCR publish." >&2
            exit 1
          fi

      - name: Login to Docker Hub
        if: ${{ matrix.target.publish == true }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: ${{ matrix.target.publish == true }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.AIO_FLEET_GHCR_TOKEN }}

      - name: Checkout app repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: JSONbored/${{ matrix.target.repo }}
          ref: ${{ matrix.target.sha }}
          path: app-repo
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Run central control check
        env:
          TARGET_REPO: ${{ matrix.target.repo }}
          TARGET_SHA: ${{ matrix.target.sha }}
          TARGET_EVENT: ${{ matrix.target.event }}
          TARGET_PUBLISH: ${{ matrix.target.publish }}
          AIO_FLEET_CHECK_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          args=(
            control-check
            --repo "${TARGET_REPO}"
            --repo-path app-repo
            --sha "${TARGET_SHA}"
            --event "${TARGET_EVENT}"
            --no-integration
            --check-run
          )
          if [[ "${TARGET_PUBLISH}" == "true" ]]; then
            args+=(--publish)
          fi
          python -m aio_fleet "${args[@]}"

      - name: Alert poll-check failure
        if: ${{ always() }}
        env:
          DETAILS_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          TARGET_REPO: ${{ matrix.target.repo }}
        run: |
          set +e
          if [[ "${JOB_STATUS}" == "success" ]]; then
            exit 0
          fi
          python -m aio_fleet alert send \
            --event poll-check \
            --status "${JOB_STATUS}" \
            --repo "${TARGET_REPO}" \
            --summary "aio-fleet required check failed for ${TARGET_REPO}" \
            --details-url "${DETAILS_URL}" \
            --format json
          exit 0
