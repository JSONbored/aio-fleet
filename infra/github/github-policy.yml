owner: JSONbored
default_branch: main
defaults:
  repository:
    visibility: public
    homepage_url: https://aethereal.dev
    has_issues: true
    has_projects: false
    has_wiki: false
    delete_branch_on_merge: true
    allow_auto_merge: false
    allow_merge_commit: true
    allow_rebase_merge: false
    allow_squash_merge: true
  branch_protection:
    strict_required_status_checks: true
    enforce_admins: false
    require_conversation_resolution: true
    require_signed_commits: true
    required_approving_review_count: 0
  actions:
    enabled: true
    allowed_actions: selected
    github_owned_allowed: true
    verified_allowed: true
    sha_pinning_required: true
    patterns_allowed:
      - peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
repositories:
  awesome-unraid:
    required_checks:
      - validate-catalog
      - CodeQL
      - Analyze (actions)
    required_secrets:
      - AIO_FLEET_BOT_TOKEN
  sure-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  simplelogin-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  khoj-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  mem0-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  infisical-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  dify-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
  signoz-aio:
    required_checks:
      - aio-fleet / required
    required_check_app_id: 3565017
