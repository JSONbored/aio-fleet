schema_version: 1
owner: JSONbored
default_branch: main
awesome_unraid_repository: JSONbored/awesome-unraid
dashboard:
  destination_repos:
    awesome-unraid:
      path: /Users/shadowbook/Documents/awesome-unraid
      github_repo: JSONbored/awesome-unraid
      role: catalog destination
      description: Community Apps-facing XML and icon catalog for validated AIO source repo changes.
      catalog_path: /Users/shadowbook/Documents/awesome-unraid
      next_action: Validate catalog state and sync source repo changes only after source validation passes.
  rehab_repos:
    nanoclaw-aio:
      path: /Users/shadowbook/Documents/nanoclaw-aio
      github_repo: JSONbored/nanoclaw-aio
      status: rehab
      description: Neglected pre-aio-fleet AIO repo that needs a full template/runtime/container overhaul before active fleet promotion.
      next_action: Run a rehab audit, remove legacy shared files, export .aio-fleet.yml, then prove aio-fleet / required before promotion.
defaults:
  python_version: "3.13"
  trunk_org_slug: aethereal
  publish_platforms: linux/amd64,linux/arm64
  integration_pytest_args: tests/integration -m integration
repos:
  unraid-aio-template:
    path: /Users/shadowbook/Documents/unraid-aio-template
    public: false
    catalog_published: false
    workflow_name: CI / AIO Template
    app_slug: unraid-aio-template
    image_name: jsonbored/unraid-aio-template
    docker_cache_scope: unraid-aio-template-image
    pytest_image_tag: aio-template:pytest
    publish_profile: template
    release_name: Template
    previous_tag_command: latest-release-tag
    upstream_name: AIO Template
    image_description: Reusable Unraid AIO template image
    xml_paths:
      - template-aio.xml
    catalog_assets:
      - source: template-aio.xml
        target: template-aio.xml
  sure-aio:
    path: /Users/shadowbook/Documents/sure-aio
    public: true
    workflow_name: CI / Sure-AIO
    app_slug: sure-aio
    image_name: jsonbored/sure-aio
    docker_cache_scope: sure-aio-image
    pytest_image_tag: sure-aio:pytest
    publish_profile: upstream-aio-track
    release_name: Sure-AIO
    upstream_name: Sure
    upstream_monitor:
      - component: aio
        name: Sure
        source: github-tags
        repo: we-promise/sure
        image: we-promise/sure
        digest_source: ghcr
        dockerfile: Dockerfile
        version_key: UPSTREAM_VERSION
        version_strip_prefix: v
        digest_key: UPSTREAM_IMAGE_DIGEST
        stable_only: true
        strategy: pr
        release_notes_url: https://github.com/we-promise/sure/releases
    image_description:
      Unraid-first AIO wrapper image for Sure (web, worker, postgres,
      redis)
    xml_paths:
      - sure-aio.xml
    catalog_assets:
      - source: sure-aio.xml
        target: sure-aio.xml
